function drawActor(sheetKey, anim, t, x, y, dir, s){
  const img = IMGS[sheetKey];
  if (!img || !img.complete || !img.naturalWidth) return;
  const a = ANIM[anim] || ANIM.idle;
  const i = a.loop ? Math.floor(t / a.spd) % a.fr.length : Math.min(a.fr.length - 1, Math.floor(t / a.spd));
  let [c, r] = a.fr[i];
  if (dir < 0 && !a.nodir) r -= 1;
  ctx.drawImage(img, (c-1)*F, (r-1)*F, F, F, Math.round(x), Math.round(y), F*s, F*s);
}
function drawHilda(x, y, dir, s){
  const img = IMGS.npc_hilda; if (!img || !img.complete) return;
  ctx.save();
  ctx.translate(Math.round(x + 16*s), Math.round(y));
  ctx.scale(dir < 0 ? -s : s, s);
  ctx.drawImage(img, 0, 0, 32, 48, -16, 0, 32, 48);
  ctx.restore();
}
function drawBabySprite(x, y, t, dir){

// ---------------- GAMEPAD (2 pad = 2 giocatori) ----------------
const GP = [ { cur:{}, prev:{} }, { cur:{}, prev:{} } ];
function pollGamepads(){
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (let i = 0; i < 2; i++){
    const g = GP[i];
    g.prev = g.cur;
    const gp = pads[i];
    if (!gp){ g.cur = {}; continue; }
    const b = n => !!(gp.buttons[n] && gp.buttons[n].pressed);
    const ax = gp.axes[0] || 0, ay = gp.axes[1] || 0;
    g.cur = {
      left:  ax < -0.4 || b(14),
      right: ax >  0.4 || b(15),
      down:  ay >  0.5 || b(13),
      jump:  b(0),
      atk:   b(2),
      ab:    b(1),
      sup:   b(3),
      ok:    b(9) || b(0),
    };
    if (gp.buttons.some(x => x && x.pressed)) initAudio();
  }
}
function gpDown(i, k){ return !!GP[i].cur[k]; }
function gpJP(i, k){ return !!GP[i].cur[k] && !GP[i].prev[k]; }
// input unificato per giocatore: tastiera + gamepad + rete
function pDown(p, k){
  if (p.net) return !!(netIn.cur & NETBITS[k]);
  return anyDown(p.scheme[k]) || gpDown(p.slot, k);
}
function pJP(p, k){
  if (p.net) return !!(netIn.cur & NETBITS[k]) && !(netIn.prev & NETBITS[k]);
  return anyJP(p.scheme[k]) || gpJP(p.slot, k);
}
const OKJ = () => jp('Enter') || jp('Space') || jp('KeyZ') || gpJP(0, 'ok');

// ------------------------------------------------ AUDIO
let AC = null, muted = false;
function initAudio(){ if (!AC){ try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } }
function nf(m){ return 440 * Math.pow(2, (m - 69) / 12); }
function blip(midi, t, dur, type, vol){
  if (!AC || muted) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = nf(midi);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfx(kind){
  if (!AC || muted) return;
  const t = AC.currentTime;
  switch(kind){
    case 'jump':  blip(64,t,.08,'square',.06); blip(71,t+.06,.08,'square',.06); break;
    case 'coin':  blip(88,t,.06,'square',.06); blip(93,t+.05,.12,'square',.06); break;
    case 'gem':   blip(84,t,.06,'square',.07); blip(88,t+.05,.06,'square',.07); blip(93,t+.1,.15,'square',.07); break;
    case 'hurt':  blip(45,t,.15,'sawtooth',.09); blip(40,t+.08,.2,'sawtooth',.09); break;
    case 'stomp': blip(50,t,.05,'square',.08); blip(43,t+.04,.1,'square',.08); break;
    case 'atk':   blip(70,t,.04,'sawtooth',.05); blip(65,t+.03,.05,'sawtooth',.05); break;
    case 'fire':  blip(78,t,.05,'sawtooth',.06); blip(72,t+.04,.08,'sawtooth',.06); break;
    case 'boss':  blip(38,t,.2,'sawtooth',.1);  blip(36,t+.1,.3,'sawtooth',.1); break;
    case 'heart': blip(76,t,.08,'triangle',.09); blip(83,t+.07,.14,'triangle',.09); break;
    case 'check': blip(72,t,.07,'square',.06); blip(76,t+.06,.07,'square',.06); blip(79,t+.12,.14,'square',.06); break;
    case 'door':  blip(60,t,.1,'triangle',.08); blip(67,t+.09,.1,'triangle',.08); blip(72,t+.18,.25,'triangle',.08); break;
    case 'text':  blip(80,t,.02,'square',.02); break;
    case 'buy':   blip(84,t,.06,'square',.07); blip(91,t+.06,.06,'square',.07); blip(96,t+.12,.15,'square',.07); break;
    case 'craft': blip(60,t,.08,'square',.07); blip(64,t+.08,.08,'square',.07); blip(67,t+.16,.08,'square',.07); blip(72,t+.24,.2,'square',.08); break;
    case 'join':  blip(72,t,.07,'square',.07); blip(76,t+.07,.07,'square',.07); blip(79,t+.14,.07,'square',.07); blip(84,t+.21,.15,'square',.07); break;
    case 'organ':
      blip(45,t,.9,'triangle',.09); blip(52,t,.9,'triangle',.07); blip(57,t,.9,'triangle',.06);
      blip(44,t+.7,1.2,'triangle',.09); blip(51,t+.7,1.2,'triangle',.07); blip(56,t+.7,1.2,'triangle',.06);
      break;
    case 'baby':  blip(90,t,.06,'square',.05); blip(95,t+.05,.06,'square',.05); blip(93,t+.1,.08,'square',.05); break;
  }
}

const music = { song:null, step:0, next:0 };
function setSong(name){
  music.song = name ? SONGS[name] : null;
  music.step = 0;
  if (AC) music.next = AC.currentTime + 0.05;
}
function updateMusic(){
  if (!AC || !music.song || muted) return;
  if (music.next < AC.currentTime) music.next = AC.currentTime + 0.05;
  const s = music.song, dur = 60 / s.tempo / 2;
  while (music.next < AC.currentTime + 0.15){
    const i = music.step % s.mel.length;
    if (s.mel[i])  blip(s.mel[i],  music.next, dur*0.9, 'square',   .04);
    if (s.bass[i]) blip(s.bass[i], music.next, dur*0.95,'triangle', .07);
    music.step++; music.next += dur;
  }
}

  fatneil:'ira', duncan:'slow', vaughn:'sprint', vicki:'focus', buddy:'focus',

const SUPER_NAME = { slow:'DISCORSO WINGER', rain:'BRITTAPOCALISSE', jail:'JAILBREAK',
  sprint:'SCATTO DA CAMPIONE', focus:'FOCUS ADDERALL', ira:'IRA SANTA',
  laser:'LASER LOTUS LIV.6', volley:'RAFFICA DEL BETA TESTER' };
function activateSuper(p){
  const kind = SUPER_OF[p.cdef.id] || 'slow';
  p.soul = 0; sfx('craft'); addShake(10);
  burst(p.x + p.w/2, p.y + p.h/2, '#f5d442', 30, 4);
  showToast('★ ' + SUPER_NAME[kind] + ' ★');
  switch(kind){
    case 'slow': slowT = 360; break;
    case 'rain': superRain = { t: 90, owner: p }; break;
    case 'jail': {
      const pool = CHARS.filter(c => c.id !== p.cdef.id && isUnlocked(c));
      const nc = pool[Math.floor(Math.random() * pool.length)];
      p.jail = { base: p.cdef, t: 900 };
      p.cdef = nc; p.costume = null;
      showToast('JAILBREAK: Abed è diventato ' + nc.name + '!');
      break; }
    case 'sprint': p.sprintT = 150; p.inv = Math.max(p.inv, 150); break;
    case 'focus': p.focusT = 480; break;
    case 'ira':
      for (const e of enemies){ killEnemy(e, p); }
      enemies = [];
      if (boss && !boss.dead) hitBoss(3);
      if (rival && !rival.defeated) hitRival(3);
      for (const q of players) if (q.hp > 0) q.hp = Math.min(q.maxhp, q.hp + 2);
      burst(p.x + p.w/2, p.y + p.h/2, '#d883d8', 60, 6);
      break;
    case 'laser': p.laserT = 110; break;
    case 'volley':
      for (let i = 0; i < 9; i++){
        projs.push({ from:'player', x: p.x + p.w/2, y: p.y + 8, w:10, h:10,
          vx: p.face * (4 + (i%3)*1.5), vy: -2 - (i%3), t: 120, grav:true, fire:true, dmg:1 });
      }
      sfx('fire');
      break;
  }
}
function updateSupers(p){
  if (p.jail){ p.jail.t--; if (p.jail.t <= 0){ p.cdef = p.jail.base; p.jail = null; showToast('Jailbreak terminato.'); } }
  if (p.sprintT > 0){ p.sprintT--; if (frame % 2 === 0) parts.push({ x:p.x+10, y:p.y+14, vx:-p.face*2, vy:0, t:14, color:'#5ae8e8' }); }
  if (p.focusT > 0) p.focusT--;
  if (p.laserT > 0){
    p.laserT--;
    const ly = p.y + 8;
    const beam = { x: p.face === 1 ? p.x + p.w : p.x - 500, y: ly, w: 500, h: 14 };
    if (frame % 8 === 0){
      for (const e of enemies) if (overlap(beam, e)) killEnemy(e, p);
      if (boss && !boss.dead && frame % 16 === 0 && overlap(beam, boss)) hitBoss(1);
      if (rival && !rival.defeated && overlap(beam, rival)) hitRival(1);
    }
    p.beam = beam;
  } else p.beam = null;
}
function updateRain(){
  if (!superRain) return;
  superRain.t--;
  if (superRain.t % 6 === 0){
    projs.push({ from:'player', x: cam.x + Math.random() * W, y: cam.y - 20, w:12, h:12,
      vx: (Math.random()-0.5)*2, vy: 4 + Math.random()*3, t: 160, grav:true, fire:true, dmg:2 });

}

// ------------------------------------------------ CARICAMENTO LIVELLO
function loadLevel(i){
  lvlIdx = i;
  net.tileLog = []; net.tileSent = 0;
  const def = LEVELS[i];
  const wMax = Math.max(...def.rows.map(r => r.length));
  const rows = def.rows.map(r => r.padEnd(wMax, ' ').split(''));
  lvl = { def, rows, w: wMax, h: rows.length, name: def.name, markers: [] };
  enemies = []; projs = []; parts = []; babies = []; boss = null; rival = null; monkey = null;
  if (i !== 2) villageBurning = false;
  let sx = TS*2, sy = 0;
  for (let y = 0; y < lvl.h; y++) for (let x = 0; x < lvl.w; x++){
    const c = rows[y][x];
    if (c === 'P'){ sx = x*TS + 6; sy = y*TS + 2; rows[y][x] = ' '; }
    else if (c === 'e'){ enemies.push(mkWalker(x*TS, y*TS)); rows[y][x] = ' '; }
    else if (c === 'f'){ enemies.push(mkFlyer(x*TS, y*TS));  rows[y][x] = ' '; }
    else if (c === 'R'){ rival = mkRival(x*TS, y*TS); rows[y][x] = ' '; }
    else if (c === 'M'){ monkey = { x:x*TS, y:y*TS - 16, seen:false }; rows[y][x] = ' '; }
    else if ('pbtaH'.includes(c)){ lvl.markers.push({ c, x: x*TS, y: y*TS - 16 }); rows[y][x] = ' '; }
  }
  const old = players;
  players = old.map((p, k) => {
    const np = mkPlayer(p.cdef, p.costume, sx + k*26, sy, k);
    np.maxhp = p.maxhp;
    return np;
  });
  if (def.fall) players.forEach((p, k) => { p.y = -60 - k*40; p.inv = 30; });
  if (def.boss){ boss = mkBoss(); babyEventDone = false; }
  // scaling nemici: élite dal mondo 3, Incubo ovunque
  for (const e of enemies){
    if (i >= 3 && e.type === 'walker' && Math.random() < 0.5){ e.hp = 2; e.elite = true; }
    if (nightmare) e.hp++;
  }
  // casse procedurali (deterministiche per livello)
  if (!def.hub && !def.boss){
    let seed = i * 1013;
    const rnd = () => { seed = (seed * 16807) % 2147483647; return seed / 2147483647; };
    for (let x = 4; x < lvl.w - 4; x += 3){
      if (rnd() > 0.14) continue;
      for (let y = 2; y < lvl.h - 1; y++){
        if (isSolid(rows[y][x]) ){
          if (rows[y-1][x] === ' ' && rows[y-2] && rows[y-2][x] === ' ') rows[y-1][x] = 'k';
          break;
        }
        if (rows[y][x] !== ' ') break;
      }
    }
  }
  buildGroups();
  setSong(def.song);
}
function mkWalker(x, y){ return { type:'walker', x:x+3, y:y+8, w:26, h:24, vx:-0.8, vy:0, hp:1, anim:Math.random()*99 }; }
function mkFlyer(x, y){ return { type:'flyer', x0:x, y0:y, x, y, w:28, h:20, t:Math.random()*99, hp:1, anim:0 }; }
function mkRival(x, y){
  return { x, y: y - 14, w:22, h:30, vx:0, vy:0, hp:8, maxhp:8, face:-1,
    mode:'pace', t:0, hurtT:0, defeated: gilbertAlly, onGround:false, anim:0 };
}
function mkBoss(){
  const hp = nightmare ? 25 : 15;
  return { x: lvl.w*TS/2 - 48, y: 70, w:96, h:96, hp, maxhp: hp, t:0,
    mode:'hover', modeT:0, tx:0, ty:0, hurtT:0, dead:false, allyT:0 };

// ------------------------------------------------ FISICA
function tileAt(tx, ty){
  if (tx < 0 || tx >= lvl.w) return 'B';
  if (ty < 0 || ty >= lvl.h) return ' ';
  return lvl.rows[ty][tx];
}
function isSolid(c){ return c === '#' || c === 'B' || c === 'F'; }
function moveAndCollide(e){
  e.x += e.vx;
  let y0 = Math.floor(e.y / TS), y1 = Math.floor((e.y + e.h - 1) / TS);
  if (e.vx > 0){
    const tx = Math.floor((e.x + e.w - 1) / TS);
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(tx, ty))){ e.x = tx*TS - e.w; e.vx = 0; e.hitWall = true; break; }
  } else if (e.vx < 0){
    const tx = Math.floor(e.x / TS);
    for (let ty = y0; ty <= y1; ty++) if (isSolid(tileAt(tx, ty))){ e.x = (tx+1)*TS; e.vx = 0; e.hitWall = true; break; }
  }
  const prevBottom = e.y + e.h;
  e.vy = Math.min(e.vy + 0.55, 14);
  e.y += e.vy;
  e.onGround = false;
  let x0 = Math.floor(e.x / TS), x1 = Math.floor((e.x + e.w - 1) / TS);
  if (e.vy > 0){
    const ty = Math.floor((e.y + e.h - 1) / TS);
    for (let tx = x0; tx <= x1; tx++){
      const c = tileAt(tx, ty);
      if (isSolid(c) || (c === '-' && prevBottom <= ty*TS + 1)){
        e.y = ty*TS - e.h; e.vy = 0; e.onGround = true; break;
      }
    }
  } else if (e.vy < 0){
    const ty = Math.floor(e.y / TS);
    for (let tx = x0; tx <= x1; tx++) if (isSolid(tileAt(tx, ty))){ e.y = (ty+1)*TS; e.vy = 0; break; }
  }
}
function overlap(a, b){ return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
function burst(x, y, color, n, spd){
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2, s = (0.5 + Math.random()) * (spd || 2.5);
    parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, t: 25 + Math.random()*15, color });
  }
}

function hurtPlayer(p, n, fromX){
  if (p.inv > 0 || p.hp <= 0 || state !== 'play') return;
  if (p.sprintT > 0) return;
  if (p.shield > 0){
    p.shield--; p.inv = 60; sfx('check'); addShake(3);
    burst(p.x + p.w/2, p.y + p.h/2, '#8ae8e8', 14, 3);
    showToast('Lo scudo di rose ha assorbito il colpo!');
    return;
  }
  addShake(5);
  combo.n = 0;
  p.hp -= n; p.inv = 75;
  p.vy = -7; p.vx = (p.x + p.w/2 < fromX) ? -5 : 5;
  sfx('hurt');
  burst(p.x + p.w/2, p.y + p.h/2, '#e84a4a', 10);
  if (p.hp <= 0){
    deaths++;
    p.downT = 240;
    if (alivePlayers().length === 0){ state = 'over'; setSong(null); sfx('organ'); }
  }
}
function fallRespawn(p){
  deaths++;
  p.hp -= 1;
  if (p.hp <= 0){
    p.downT = 240;
    if (alivePlayers().length === 0){ state = 'over'; setSong(null); sfx('organ'); return; }
  }
  p.x = p.cpx; p.y = p.cpy; p.vx = 0; p.vy = 0; p.inv = 90;
  sfx('hurt');
}

// ------------------------------------------------ UPDATE: GIOCO
function firePlayerShot(p, lava){
  projs.push({ from:'player', owner: p, x: p.x + p.w/2 + p.face*10, y: p.y + 10, w: lava?12:10, h: lava?12:10,
    vx: p.face * (lava?7:6.5), vy: 0, t: 80, fire: true, dmg: lava?2:1 });
  sfx('fire');
}
function updateOnePlayer(p, atkBoxes){
  if (p.hp <= 0){
    p.downT--;
    if (p.downT <= 0){
      const buddy = alivePlayers()[0];
      if (buddy){ p.hp = p.maxhp; p.x = buddy.x; p.y = buddy.y - 20; p.vx = 0; p.vy = 0; p.inv = 90; sfx('join'); }
    }
    return;
  }
  updateSupers(p);
  const spdMul = (boons.stivali ? 1.15 : 1) * (p.sprintT > 0 ? 2.6 : 1);
  const acc = p.onGround ? 0.9 : 0.55;
  if (pDown(p,'left'))  { p.vx = Math.max(p.vx - acc*spdMul, -p.cdef.speed*spdMul); p.face = -1; }
  else if (pDown(p,'right')){ p.vx = Math.min(p.vx + acc*spdMul, p.cdef.speed*spdMul); p.face = 1; }
  else p.vx *= p.onGround ? 0.72 : 0.92;
  if (Math.abs(p.vx) < 0.05) p.vx = 0;

  const maxJumps = 1 + (p.cdef.ab === 'dj' ? 1 : 0) + (boons.piuma ? 1 : 0);
  if (p.onGround) p.jumps = 0;
  if (pJP(p,'jump')){
    if (p.onGround){ p.vy = -p.cdef.jump; p.jumps = 1; sfx('jump'); }
    else if (p.jumps < maxJumps){ p.vy = -p.cdef.jump * 0.92; p.jumps++; sfx('jump'); burst(p.x+p.w/2, p.y+p.h, '#cccccc', 6, 1.5); }
  }
  if (!pDown(p,'jump') && p.vy < -4) p.vy = -4;
  p.preVy = p.vy;
  moveAndCollide(p);
  if (p.cdef.ab === 'glide' && pDown(p,'jump') && p.vy > 1.4 && !p.onGround) p.vy = 1.4;

  // super al 100% di Meraviglia
  if (pJP(p,'sup') && p.soul >= 100) activateSuper(p);

  if (p.atkCd > 0) p.atkCd--;
  if (p.atkT > 0) p.atkT--;
  if (pJP(p,'atk') && p.atkCd <= 0){
    const fast = p.cdef.ab === 'blade' || p.focusT > 0;
    p.atkT = fast ? 12 : 10;
    p.atkCd = p.focusT > 0 ? 8 : fast ? 16 : 24;
    sfx('atk');
  }
  if (p.abCd > 0) p.abCd--;
  if (pJP(p,'ab') && p.abCd <= 0){
    if (p.cdef.ab === 'fire'){ firePlayerShot(p, false); p.abCd = 40; }
    else if (lavagun && p.cdef.ab !== 'wave'){ firePlayerShot(p, true); p.abCd = 55; }
    else if (p.cdef.ab === 'wave'){
      p.abCd = 300; sfx('boss');
      burst(p.x + p.w/2, p.y + p.h/2, '#d883d8', 26, 4);
      for (const e of enemies){
        if (Math.hypot(e.x - p.x, e.y - p.y) < 130){ e.hp = 0; burst(e.x + e.w/2, e.y + e.h/2, '#d883d8', 10); }
      }
      if (boss && !boss.dead && Math.hypot(boss.x + 48 - p.x, boss.y + 48 - p.y) < 170) hitBoss(2);
      if (rival && !rival.defeated && Math.hypot(rival.x - p.x, rival.y - p.y) < 130) hitRival(2);
      showToast('Onda di perdono!');
    }
  }

  // tile speciali
  const cx0 = Math.floor(p.x / TS), cx1 = Math.floor((p.x + p.w - 1) / TS);
  const cy0 = Math.floor(p.y / TS), cy1 = Math.floor((p.y + p.h - 1) / TS);
  for (let ty = cy0; ty <= cy1; ty++) for (let tx = cx0; tx <= cx1; tx++){
    const c = tileAt(tx, ty);
    if (c === 'o'){ setTile(tx, ty, ' '); addWallet(1); sfx('coin'); burst(tx*TS+16, ty*TS+16, '#f5d442', 5, 1.5); }
    else if (c === 'g'){ setTile(tx, ty, ' '); cristalli++; sfx('gem'); burst(tx*TS+16, ty*TS+16, '#5ae8e8', 10, 2); showToast('+1 CRISTALLO DI HAWKTHORNE (' + cristalli + ')'); }
    else if (c === 'h'){ if (p.hp < p.maxhp){ setTile(tx, ty, ' '); p.hp++; sfx('heart'); burst(tx*TS+16, ty*TS+16, '#e85a7a', 8, 2); } }
    else if (c === 'C'){ setTile(tx, ty, 'c'); players.forEach(q => { q.cpx = tx*TS + 4; q.cpy = ty*TS - q.h - 2; }); sfx('check'); showToast('CONSOLE — CHECKPOINT'); }
    else if (c === '^' || c === '~'){ hurtPlayer(p, 1, tx*TS + 16); }
    else if (c === 'X'){
      const locked = (boss && !boss.dead) || (rival && !rival.defeated);
      if (!locked){
        sfx('door');
        if (lvlIdx < LEVELS.length - 1) nextLevel();
      }
    }
  }
  if (p.y > lvl.h * TS + 60) fallRespawn(p);
  if (p.inv > 0) p.inv--;
  p.anim += Math.abs(p.vx) * 0.35;

  if (p.atkT > 0){
    const big = p.cdef.ab === 'blade' || p.focusT > 0;
    const aw = p.focusT > 0 ? 48 : big ? 40 : 30;
    atkBoxes.push({ x: p.face === 1 ? p.x + p.w : p.x - aw, y: p.y + 2, w: aw, h: 26, owner: p });
  }

  // menu contestuali (negozio / forgia)
  if (pJP(p,'down') && !menu){
    let best = null, bestD = 1e9;
    for (const g of groups){
      if (!g.shop && !g.forge) continue;
      if (!overlap(p, { x:g.x - 50, y:g.y - 40, w: g.ids.length*30 + 100, h: 190 })) continue;
      const d = Math.abs(g.x + g.ids.length*15 - p.x - p.w/2);
      if (d < bestD){ bestD = d; best = g; }
    }
    if (best){ best.shop ? openShop(p) : tryForge(); }
  }
}
// benedizioni di Hilda (stile Hades: 2 casuali a visita)
const BOONS = [
  { id:'scudo',    name:'Scudo di rose (assorbe 1 colpo, x3)', cost:20, act(q){ q.shield = 3; } },
  { id:'stivali',  name:'Stivali del Decano (velocità +15%)',  cost:25, act(){ boons.stivali = true; } },
  { id:'caffe',    name:'Caffè della biblioteca (Meraviglia +50%)', cost:25, act(){ boons.caffe = true; } },
  { id:'dado',     name:'Dado di Chang (monete doppie)',       cost:35, act(){ boons.dado = true; } },
  { id:'piuma',    name:'Piuma di falco (+1 salto in aria)',   cost:40, act(){ boons.piuma = true; } },
  { id:'calamita', name:'Calamita di Magnitude (attira monete)', cost:30, act(){ boons.calamita = true; } },
  { id:'scimmia',  name:'Annie\'s Boobs (compagna raccogli-monete)', cost:45, act(q){ pet = { x:q.x, y:q.y - 30 }; } },
];
function openShop(p){
  const pool = BOONS.filter(b => !boons[b.id] && !(b.id === 'scimmia' && pet) && !(b.id === 'scudo' && p.shield > 0));
  const offer = [];
  while (offer.length < 2 && pool.length){ offer.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]); }
  menu = { type:'shop', p, sel:0, items:[
    { name:'Pane e acqua di rose (cura completa)', cost:10, act(q){ q.hp = q.maxhp; } },
    { name:'Cuore di Hawkthorne (+1 cuore max)',   cost:30, act(q){ q.maxhp++; q.hp = q.maxhp; } },
    ...offer.map(b => ({ name:b.name, cost:b.cost, act(q){ b.act(q); boons[b.id] = b.id === 'scudo' || b.id === 'scimmia' ? boons[b.id] : true; } })),
  ]};
  sfx('text');
}
function tryForge(){
  if (lavagun){ showToast('Hai già la LANCIA-LAVA.'); return; }
  if (cristalli >= 3){
    cristalli -= 3; lavagun = true; sfx('craft');
    showToast('LANCIA-LAVA FORGIATA! Tasto abilità [C]/[G]');
    burst(players[0].x, players[0].y, '#f5822a', 30, 4);
  } else showToast('Servono 3 cristalli (' + cristalli + '/3)');
}

function updatePlay(){
  if ((jp('KeyF') || gpJP(1,'jump') || gpJP(1,'ok')) && players.length === 1 && !net.role){ joinP2(); }
  const worldTick = slowT > 0 ? (frame % 3 === 0) : true;
  if (slowT > 0) slowT--;
  updateRain();
  const atkBoxes = [];
  for (const p of players) updateOnePlayer(p, atkBoxes);
  const alive = alivePlayers();
  if (!alive.length) return;

  // casse distrutte dagli attacchi
  for (const ab of atkBoxes){
    const tx0 = Math.floor(ab.x / TS), tx1 = Math.floor((ab.x + ab.w) / TS);
    const ty0 = Math.floor(ab.y / TS), ty1 = Math.floor((ab.y + ab.h) / TS);
    for (let ty = ty0; ty <= ty1; ty++) for (let tx = tx0; tx <= tx1; tx++)
      if (tileAt(tx, ty) === 'k') breakCrate(tx, ty, ab.owner);
  }
  // calamita: attira le monete vicine
  if (boons.calamita && frame % 4 === 0){
    for (const p of alive){
      const ctx0 = Math.floor(p.x / TS) - 3, cty0 = Math.floor(p.y / TS) - 3;
      for (let ty = cty0; ty < cty0 + 7; ty++) for (let tx = ctx0; tx < ctx0 + 7; tx++)
        if (tileAt(tx, ty) === 'o'){ setTile(tx, ty, ' '); addWallet(1); sfx('coin'); burst(tx*TS+16, ty*TS+16, '#f5d442', 4, 1.5); }
    }
  }
  // Annie's Boobs: la scimmia compagna raccoglie monete
  if (pet){
    const o = alive[0];
    pet.x += (o.x - o.face*36 - pet.x) * 0.08;
    pet.y += (o.y - 14 - pet.y) * 0.08;
    if (frame % 5 === 0){
      const tx = Math.floor((pet.x + 16) / TS), ty = Math.floor((pet.y + 24) / TS);
      for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++)
        if (tileAt(tx+dx, ty+dy) === 'o'){ setTile(tx+dx, ty+dy, ' '); addWallet(1); sfx('coin'); burst((tx+dx)*TS+16, (ty+dy)*TS+16, '#f5d442', 4, 1.5); }
    }
  }
  // spiriti di Cornelius nelle zone buie
  if (lvl.def.dark && frame % 700 === 350 && enemies.filter(e => e.type === 'ghost').length < 3){
    const t = alive[Math.floor(Math.random()*alive.length)];
    enemies.push({ type:'ghost', x: t.x + (Math.random() < 0.5 ? -420 : 420), y: t.y - 60, w:30, h:34, hp:1, anim:Math.random()*99, t:0 });
  }
  if (combo.t > 0){ combo.t--; if (combo.t <= 0) combo.n = 0; }

  // gruppi NPC
  for (const g of groups){
    if (g.done) continue;
    for (const p of alive){
      if (overlap(p, { x:g.x - 40, y:g.y - 30, w: g.ids.length*30 + 80, h: 170 })){
        g.done = true;
        const ev = g.event;
        startCut(g.lines, () => {
          state = 'play';
          if (ev === 'burn'){ villageBurning = true; sfx('fire'); showToast('IL VILLAGGIO È IN FIAMME'); }
        });
        break;
      }
    }
  }
  // scimmia easter egg
  if (monkey && !monkey.seen){
    for (const p of alive) if (Math.abs(p.x - monkey.x) < 50){ monkey.seen = true; showToast('ANNIE\'S BOOBS ti osserva. E ti giudica.'); sfx('baby'); }
  }

  // nemici
  const spd = nightmare ? 1.25 : 1;
  for (const e of enemies){
    if (worldTick){
      if (e.type === 'walker'){
        e.anim++;
        e.hitWall = false;
        e.vx = Math.sign(e.vx || -1) * 0.8 * spd * (e.elite ? 1.4 : 1);
        const dir = Math.sign(e.vx);
        moveAndCollide(e);
        if (e.hitWall) e.vx = -dir * 0.8;
        else if (e.onGround){
          const below = tileAt(Math.floor((e.x + (dir > 0 ? e.w + 2 : -2)) / TS), Math.floor((e.y + e.h + 4) / TS));
          if (!isSolid(below) && below !== '-') e.vx = -dir * 0.8;
        }
      } else if (e.type === 'flyer'){
        e.t += 0.03 * spd; e.anim++;
        e.x = e.x0 + Math.sin(e.t) * 70;
        e.y = e.y0 + Math.sin(e.t * 2.3) * 26;
      } else if (e.type === 'ghost'){
        e.anim++; e.t++;
        const t = nearestPlayer(e.x);
        if (t){
          const dx = t.x - e.x, dy = t.y - 10 - e.y;
          const d = Math.hypot(dx, dy) || 1;
          const gspd = 0.9 * spd;
          e.x += dx / d * gspd; e.y += dy / d * gspd + Math.sin(e.anim * 0.08) * 0.6;
        }
      }
    }
    for (const ab of atkBoxes) if (e.hp > 0 && overlap(ab, e)){ e.hp--; if (e.hp <= 0) killEnemy(e, ab.owner); else { sfx('atk'); burst(e.x+e.w/2, e.y+e.h/2, '#e8e8e8', 5); } }
    for (const p of alive){
      if (e.hp > 0 && overlap(p, e)){
        if (p.sprintT > 0){ killEnemy(e, p); }
        else if (e.type !== 'ghost' && p.preVy > 2 && p.y + p.h < e.y + e.h * 0.6){
          e.hp--; p.vy = -8;
          if (e.hp <= 0) killEnemy(e, p); else sfx('stomp');
        } else hurtPlayer(p, 1, e.x + e.w/2);
      }
    }
  }
  enemies = enemies.filter(e => e.hp > 0);

  // proiettili
  for (const pr of projs){
    const hostile = pr.from !== 'player' && pr.from !== 'ally';
    if (!hostile || worldTick){
      pr.x += pr.vx; pr.y += pr.vy; pr.t--;
      if (pr.grav) pr.vy += 0.25;
    }
    const ptx = Math.floor((pr.x + pr.w/2) / TS), pty = Math.floor((pr.y + pr.h/2) / TS);
    const tc = tileAt(ptx, pty);
    if (tc === 'k' && !hostile){ breakCrate(ptx, pty, pr.owner || alive[0]); pr.t = 0; }
    else if (isSolid(tc)) pr.t = 0;
    if (pr.from === 'player'){
      for (const e of enemies) if (e.hp > 0 && overlap(pr, e)){ e.hp -= (pr.dmg || 1); pr.t = 0; if (e.hp <= 0) killEnemy(e, pr.owner || alive[0]); }
      if (boss && !boss.dead && overlap(pr, boss)){ hitBoss(pr.dmg || 1); pr.t = 0; }
      if (rival && !rival.defeated && overlap(pr, rival)){ hitRival(pr.dmg || 1); pr.t = 0; }
    } else if (pr.from === 'ally'){
      if (boss && !boss.dead && overlap(pr, boss)){ hitBoss(1); pr.t = 0; }
    } else {
      for (const p of alive) if (overlap(pr, p)){ hurtPlayer(p, 1, pr.x); pr.t = 0; }
    }
    if (pr.fire && frame % 3 === 0) parts.push({ x: pr.x + pr.w/2, y: pr.y + pr.h/2, vx: 0, vy: -0.5, t: 12, color: '#f5a442' });
  }
  projs = projs.filter(pr => pr.t > 0);

  if (rival && !rival.defeated && worldTick) updateRival(atkBoxes);
  else if (rival && !rival.defeated) { for (const ab of atkBoxes) if (overlap(ab, rival)) hitRival(1); }
  if (boss && !boss.dead && worldTick) updateBoss(atkBoxes);
  else if (boss && !boss.dead) { for (const ab of atkBoxes) if (overlap(ab, boss) && boss.hurtT <= 0) hitBoss(1); }
  updateBabies();

  for (const q of parts){ q.x += q.vx; q.y += q.vy; q.vy += 0.12; q.t--; }
  parts = parts.filter(q => q.t > 0);

  // camera sul baricentro dei vivi
  const fx = alive.reduce((s,p)=>s+p.x+p.w/2,0)/alive.length;
  const fy = alive.reduce((s,p)=>s+p.y+p.h/2,0)/alive.length;
  cam.x = Math.max(0, Math.min(fx - W/2, lvl.w*TS - W));
  cam.y = Math.max(0, Math.min(fy - H/2, Math.max(0, lvl.h*TS - H)));
  // P2 troppo lontano → teletrasporto
  if (alive.length === 2 && Math.abs(alive[0].x - alive[1].x) > W + 80){
    alive[1].x = alive[0].x; alive[1].y = alive[0].y - 20; alive[1].inv = 60;
  }
  if (toast){ toast.t--; if (toast.t <= 0) toast = null; }
}

// ------------------------------------------------ GILBERT (duello)
function hitRival(n){
  if (rival.hurtT > 0) return;
  rival.hp -= n; rival.hurtT = 20; sfx('boss');
  burst(rival.x + 11, rival.y + 15, '#5ae8e8', 12, 3);
  if (rival.hp <= 0){
    rival.defeated = true;
    gilbertAlly = true;
    burst(rival.x + 11, rival.y + 15, '#f5d442', 30, 4);
    startCut(gilbertPages(), () => { state = 'play'; showToast('GILBERT SI UNISCE AL GRUPPO'); });
  }
}
function nearestPlayer(x){
  const alive = alivePlayers();
  return alive.reduce((best,p) => Math.abs(p.x - x) < Math.abs(best.x - x) ? p : best, alive[0]);
}
function updateRival(atkBoxes){
  const r = rival;
  const p = nearestPlayer(r.x);
  if (!p) return;
  r.t++; r.anim++;
  if (r.hurtT > 0) r.hurtT--;
  const dist = p.x - r.x;
  if (Math.abs(dist) > 450) return;
  r.face = Math.sign(dist) || -1;
  if (r.mode === 'pace'){
    r.vx = Math.abs(dist) > 180 ? r.face * 1.2 : -r.face * 0.8;
    if (r.t % 130 === 0){
      if (Math.random() < 0.5 && Math.abs(dist) < 400){ r.mode = 'dash'; r.vx = r.face * 5; r.t = 1; sfx('atk'); }
      else { r.mode = 'throw'; r.t = 1; }
    }
  } else if (r.mode === 'dash'){
    r.vx = r.face * 5;
    if (r.t % 34 === 0){ r.mode = 'pace'; r.vx = 0; }
  } else {
    if (r.t % 14 === 0 && r.t <= 42){
      projs.push({ from:'boss', x: r.x + 11, y: r.y + 8, w:10, h:10, vx: r.face * 4.2, vy: -1, t:120 });
      sfx('fire');
    }
    if (r.t > 50){ r.mode = 'pace'; r.t = 1; }
  }
  moveAndCollide(r);
  for (const ab of atkBoxes) if (overlap(ab, r)) hitRival(1);
  for (const q of alivePlayers()){
    if (overlap(q, r)){
      if (q.preVy > 2 && q.y + q.h < r.y + r.h * 0.5){ hitRival(1); q.vy = -9; }
      else hurtPlayer(q, 1, r.x + r.w/2);
    }
  }
}

// ------------------------------------------------ CORNELIUS + BAMBINI
function hitBoss(n){
  if (boss.mode === 'stunned') n *= 2;
  boss.hp -= n; boss.hurtT = 12; sfx('boss'); addShake(6);
  const sp = alivePlayers()[0]; if (sp) soulGain(sp, 8);
  burst(boss.x + 48, boss.y + 48, '#a44ae8', 14, 3);
  if (boss.hp <= 0){
    boss.dead = true;
    babies = [];
    burst(boss.x + 48, boss.y + 48, '#f5d442', 60, 5);
    setSong(null);
    if (!SAVE.finished){ SAVE.finished = true; saveGame(); }
    startCut(endingPages(), () => { state = 'win'; endTime = performance.now(); setSong('win'); });
    return;
  }
  if (!babyEventDone && boss.hp <= 8){
    babyEventDone = true;
    startCut(babyPages(), () => {
      state = 'play';
      spawnBabies();
      boss.mode = 'stunned'; boss.modeT = 0;
      sfx('baby');
    });
  }
}
function spawnBabies(){
  babies = [];
  const gy = 15 * TS - 26;
  for (let i = 0; i < 11; i++){
    babies.push({ x: 60 + i * 26, y: gy, vx: 2 + Math.random(), anim: Math.random()*9, leaving:false });
  }
}
function updateBabies(){
  if (!babies.length) return;
  for (const bb of babies){
    bb.anim += 0.12;
    if (bb.leaving){ bb.x += bb.vx; continue; }
    const targetX = boss.x + 48;
    bb.x += Math.sign(targetX - bb.x) * Math.min(Math.abs(targetX - bb.x), bb.vx);
    if (frame % 40 === 0 && Math.abs(targetX - bb.x) < 60) sfx('baby');
  }
  babies = babies.filter(bb => bb.x > -40 && bb.x < lvl.w*TS + 40);
}
function updateBoss(atkBoxes){
  const b = boss;
  const p = nearestPlayer(b.x + 48);
  if (!p) return;
  b.t++; b.modeT++;
  if (b.hurtT > 0) b.hurtT--;
  const phase = b.hp > 10 ? 0 : b.hp > 5 ? 1 : 2;
  if (b.mode === 'hover'){
    b.x = lvl.w*TS/2 - 48 + Math.sin(b.t * (0.015 + phase*0.006)) * (lvl.w*TS/2 - 140);
    b.y = 70 + Math.sin(b.t * 0.05) * 12;
    const dropEvery = 100 - phase * 22;
    if (b.modeT % dropEvery === 0){
      projs.push({ from:'boss', x: b.x + 40, y: b.y + 90, w:14, h:14, vx: (p.x - b.x - 40) * 0.012, vy: 1.5, t: 200, grav: true, fire: true });
      sfx('fire');
    }
    if (b.modeT > 320 - phase * 60){ b.mode = 'swoop'; b.modeT = 0; b.tx = p.x - 38; b.ty = Math.min(p.y - 20, lvl.h*TS - 200); }
  } else if (b.mode === 'swoop'){
    b.x += (b.tx - b.x) * 0.06;
    b.y += (b.ty - b.y) * 0.06;
    if (b.modeT > 90){ b.mode = 'rise'; b.modeT = 0; }
  } else if (b.mode === 'stunned'){
    b.y += (15*TS - b.h - 8 - b.y) * 0.08;
    b.x += (lvl.w*TS/2 - 48 - b.x) * 0.04;
    if (frame % 5 === 0) burst(b.x + 20 + Math.random()*56, b.y + 90, '#f0c8a0', 1, 1);
    if (b.modeT > 400){
      b.mode = 'rise'; b.modeT = 0;
      for (const bb of babies){ bb.leaving = true; bb.vx = (bb.x < lvl.w*TS/2 ? -3 : 3); }
    }
  } else {
    b.y += (70 - b.y) * 0.05;
    b.x += (lvl.w*TS/2 - 48 - b.x) * 0.02;
    if (b.modeT > 70){ b.mode = 'hover'; b.modeT = 0; }
  }
  if (gilbertAlly){
    b.allyT++;
    if (b.allyT % 260 === 0){
      projs.push({ from:'ally', x: 70, y: 14*TS, w:10, h:10, vx: 5, vy: -3.2, t: 200, grav:true });
      sfx('fire');
    }
  }
  for (const ab of atkBoxes) if (overlap(ab, b) && b.hurtT <= 0) hitBoss(1);
  for (const q of alivePlayers()){
    if (overlap(q, b)){
      if (q.preVy > 2 && q.y + q.h < b.y + b.h * 0.5 && b.hurtT <= 0){ hitBoss(1); q.vy = -9; }
      else if (b.mode !== 'stunned') hurtPlayer(q, 1, b.x + b.w/2);
    }
  }
}

function drawPlayer(p){

    drawActor(sheetOf(p), 'dead', 0, p.x + p.w/2 - 24 - cam.x, p.y + p.h - 46 - cam.y, p.face, 1);
    return;

  if (p.atkT > 0){ anim = 'attack'; t = 12 - p.atkT; }
  else if (p.inv > 55){ anim = 'hurt'; }
  else if (!p.onGround){ anim = 'jump'; }
  else if (Math.abs(p.vx) > 0.3){ anim = 'walk'; }
  drawActor(sheetOf(p), anim, t, p.x + p.w/2 - 24 - cam.x, p.y + p.h - 46 - cam.y, p.face, 1);

}

function netEncodeInput(){
  let b = 0;
  const sc = SCHEMES[0];
  for (const k in NETBITS) if ((sc[k] && anyDown(sc[k])) || gpDown(0, k)) b |= NETBITS[k];
  if (jp('Enter') || gpJP(0,'ok')) b |= NETBITS.ok;
  return b;
}
async function netSetup(role){
  net.role = role;
  net.pc = new RTCPeerConnection({ iceServers: [{ urls:'stun:stun.l.google.com:19302' }] });
  const onOpen = () => {
    net.open = true; sfx('join');
    if (role === 'guest'){ state = 'select'; showToast('CONNESSO! Scegli il personaggio.'); }
    else showToast('OSPITE CONNESSO!');
  };
  const onMsg = ev => {
    let m; try { m = JSON.parse(ev.data); } catch(e){ return; }
    if (m.t === 'in'){ netIn.prev = netIn.cur; netIn.cur = m.b; }
    else if (m.t === 'hello'){ net.hello = m; }
    else if (m.t === 'st'){ net.snap = m.s; }
  };
  if (role === 'host'){
    net.ch = net.pc.createDataChannel('hawk');
    net.ch.onopen = onOpen; net.ch.onmessage = onMsg;
    net.ch.onclose = () => netDrop();
    const offer = await net.pc.createOffer();
    await net.pc.setLocalDescription(offer);
    await iceDone();
    const code = btoa(JSON.stringify(net.pc.localDescription));
    prompt('CODICE 1 — copialo e mandalo all\'amico (che sceglie UNISCITI):', code);
    const ans = prompt('Ora incolla qui il CODICE 2 che ti manda l\'amico:');
    if (ans){ try { await net.pc.setRemoteDescription(JSON.parse(atob(ans.trim()))); } catch(e){ alert('Codice non valido.'); netDrop(); } }
    else netDrop();
  } else {
    net.pc.ondatachannel = ev => {
      net.ch = ev.channel;
      net.ch.onopen = onOpen; net.ch.onmessage = onMsg;
      net.ch.onclose = () => netDrop();
    };
    const off = prompt('Incolla il CODICE 1 dell\'host:');
    if (!off){ netDrop(); return; }
    try {
      await net.pc.setRemoteDescription(JSON.parse(atob(off.trim())));
      const answer = await net.pc.createAnswer();
      await net.pc.setLocalDescription(answer);
      await iceDone();
      prompt('CODICE 2 — copialo e rimandalo all\'host:', btoa(JSON.stringify(net.pc.localDescription)));
    } catch(e){ alert('Codice non valido.'); netDrop(); }
  }
  function iceDone(){
    return new Promise(res => {
      if (net.pc.iceGatheringState === 'complete') return res();
      net.pc.onicegatheringstatechange = () => { if (net.pc.iceGatheringState === 'complete') res(); };
      setTimeout(res, 3000);
    });
  }
}
function netDrop(){
  if (net.ch) try { net.ch.close(); } catch(e){}
  if (net.pc) try { net.pc.close(); } catch(e){}
  const wasGuest = net.role === 'guest';
  net = { role:null, pc:null, ch:null, open:false, tileLog:[], tileSent:0, hello:null, snap:null, sendT:0, prevOk:false };
  netIn = { cur:0, prev:0 };
  players = players.filter(p => !p.net);
  if (wasGuest && state !== 'tv'){ state = 'title'; setSong('title'); }
  showToast('Connessione online chiusa.');
}
function netSend(o){ if (net.ch && net.ch.readyState === 'open') try { net.ch.send(JSON.stringify(o)); } catch(e){} }
function hostSnapshot(){
  const s = {
    lv: lvlIdx, st: state, cx: Math.round(cam.x), cy: Math.round(cam.y),
    pl: players.map(p => [sheetOf(p), Math.round(p.x), Math.round(p.y), p.face,
      p.hp <= 0 ? 'dead' : p.atkT > 0 ? 'attack' : !p.onGround ? 'jump' : Math.abs(p.vx) > 0.3 ? 'walk' : 'idle',
      Math.round(p.anim), p.hp, p.maxhp, Math.round(p.soul), p.shield]),
    en: enemies.map(e => [e.type, Math.round(e.x), Math.round(e.y), Math.round(e.anim)]),
    pr: projs.map(pr => [Math.round(pr.x), Math.round(pr.y), pr.w, pr.h, pr.fire ? 1 : pr.from === 'ally' ? 2 : 0]),
    bb: babies.map(b => [Math.round(b.x), Math.round(b.y), Math.round(b.anim), b.vx > 0 ? 1 : -1]),
    bo: boss && !boss.dead ? [Math.round(boss.x), Math.round(boss.y), boss.hp, boss.maxhp, boss.mode, boss.hurtT] : null,
    ri: rival && !rival.defeated ? [Math.round(rival.x), Math.round(rival.y), rival.face, rival.hp, Math.abs(rival.vx) > 0.3 ? 'walk' : 'idle', Math.round(rival.anim)] : null,
    td: net.tileLog.slice(net.tileSent),
    hud: { w: SAVE.wallet, c: cristalli, lg: lavagun, nm: lvl.name, tst: toast ? toast.text : null, cb: combo.n, ally: gilbertAlly && lvl.def.boss },
    cut: state === 'cut' && cut ? { who: cut.pages[cut.i].who, tx: cut.pages[cut.i].text, i: cut.i, n: cut.pages.length } : null,
  };
  net.tileSent = net.tileLog.length;
  netSend({ t:'st', s });
}
function updateHostNet(){
  if (net.role !== 'host' || !net.open) return;
  if (net.hello && players.length === 1 && (state === 'play' || state === 'cut')){
    const cdef = charById(net.hello.id) || charById('abed');
    const p1 = players[0];
    const p2 = mkPlayer(cdef, net.hello.cost || null, p1.x, p1.y - 10, 1);
    p2.net = true; p2.cpx = p1.cpx; p2.cpy = p1.cpy; p2.inv = 60;
    players.push(p2);
    net.hello = null;
    showToast('GIOCATORE 2 ONLINE: ' + cdef.name);
  }
  net.sendT++;
  if (net.sendT % 2 === 0) hostSnapshot();
}
function updateGuest(){
  netSend({ t:'in', b: netEncodeInput() });
  const s = net.snap;
  if (!s) return;
  if (s.lv !== lvlIdx || !lvl){ loadLevel(s.lv); players = []; }
  for (const d of s.td) lvl.rows[d[1]][d[0]] = d[2];
  s.td = [];
  cam.x = s.cx; cam.y = s.cy;
}
function drawGuest(){
  const s = net.snap;
  if (!s || !lvl){ ctx.fillStyle = '#0e0c2a'; ctx.fillRect(0,0,W,H); text('In attesa dell\'host…', W/2, H/2, 18, '#f5d442', 'center'); return; }
  drawBackground();
  drawTiles();
  drawGroups();
  for (const e of s.en){
    const fake = { type:e[0], x:e[1], y:e[2], anim:e[3], t:e[3], w:28, h:24, hp:1 };
    e[0] === 'walker' ? drawWalker(fake) : e[0] === 'ghost' ? drawGhost(fake) : drawFlyer(fake);
  }
  if (s.ri) drawActor('gilbert', s.ri[4], s.ri[5], s.ri[0] + 11 - 24 - cam.x, s.ri[1] + 30 - 46 - cam.y, s.ri[2], 1);
  if (s.bo){ boss = { x:s.bo[0], y:s.bo[1], hp:s.bo[2], maxhp:s.bo[3], mode:s.bo[4], hurtT:s.bo[5], dead:false, w:96, h:96 }; drawBoss(); }
  for (const b of s.bb) drawBabySprite(b[0] - cam.x, b[1] - cam.y, b[2], b[3]);
  if (s.hud.ally && s.bo) drawActor('gilbert', 'idle', 0, 40 - cam.x, 14*TS - 14 - cam.y, 1, 1);
  for (const pr of s.pr){
    ctx.fillStyle = pr[4] === 1 ? '#f5822a' : pr[4] === 2 ? '#5ae8e8' : '#e84a4a';
    ctx.fillRect(pr[0] - cam.x, pr[1] - cam.y, pr[2], pr[3]);
  }
  for (let i = 0; i < s.pl.length; i++){
    const d = s.pl[i];
    drawActor(d[0], d[4], d[5], d[1] + 10 - 24 - cam.x, d[2] + 28 - 46 - cam.y, d[3], 1);
    text('P' + (i+1), d[1] + 10 - cam.x, d[2] - 24 - cam.y, 11, i ? '#8ae8e8' : '#f5d442', 'center');
  }
  drawDarkness();
  // HUD ospite
  for (let i = 0; i < s.pl.length; i++){
    const d = s.pl[i];
    const fake = { hp:d[6], maxhp:d[7], soul:d[8] };
    drawHearts(fake, i ? W - 14 : 14, !!i);
    drawSoul(fake, i ? W - 14 : 14, !!i);
  }
  ctx.fillStyle = '#f5d442'; ctx.fillRect(16, 62, 12, 14);
  text('x ' + s.hud.w, 34, 75, 16, '#fff');
  text('SEI IL GIOCATORE 2 (ONLINE)', W/2, H - 12, 12, '#8ae8e8', 'center');
  text(s.hud.nm, W/2, 26, 15, 'rgba(255,255,255,0.85)', 'center');
  if (s.bo){
    const bw = 400;
    ctx.fillStyle = '#3a3a44'; ctx.fillRect(W/2 - bw/2, H - 42, bw, 12);
    ctx.fillStyle = '#a44ae8'; ctx.fillRect(W/2 - bw/2, H - 42, bw * s.bo[2] / s.bo[3], 12);
  }
  if (s.hud.tst) text(s.hud.tst, W/2, H - 69, 15, '#fff', 'center');
  if (s.cut){
    ctx.fillStyle = 'rgba(4,4,12,0.62)'; ctx.fillRect(0, 0, W, H);
    const bx = 90, by = H - 180, bw = W - 180, bh = 140;
    ctx.fillStyle = '#101024'; ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#f5d442'; ctx.lineWidth = 3; ctx.strokeRect(bx+3, by+3, bw-6, bh-6);
    const nm = nameOf(s.cut.who);
    if (nm) text(nm, bx + 24, by + 34, 16, '#f5d442');
    ctx.fillStyle = '#fff'; ctx.font = '15px "Courier New", monospace';
    const words = s.cut.tx.split(' ');
    let line = '', ly = by + 60;
    for (const w2 of words){
      const t2 = line ? line + ' ' + w2 : w2;
      if (ctx.measureText(t2).width > bw - 48){ ctx.fillText(line, bx + 24, ly); line = w2; ly += 20; }
      else line = t2;
    }
    ctx.fillText(line, bx + 24, ly);
    text('▶ INVIO (host o tu)', bx + bw - 20, by + bh - 14, 13, '#f5d442', 'right');
  }
}
function drawOnlineMenu(){
  ctx.fillStyle = '#0e0c2a'; ctx.fillRect(0, 0, W, H);
  text('CO-OP ONLINE (P2P)', W/2, 130, 32, '#f5d442', 'center');
  text('Niente server: vi scambiate due codici (WhatsApp, mail, come volete).', W/2, 170, 14, '#9a9ac0', 'center');
  text('[1]  OSPITA una partita  (genera il CODICE 1)', W/2, 250, 20, '#5ae87a', 'center');
  text('[2]  UNISCITI  (incolla il CODICE 1, genera il CODICE 2)', W/2, 300, 20, '#8ae8e8', 'center');
  text('[X]  indietro', W/2, 370, 16, 'rgba(255,255,255,0.6)', 'center');
  text('Ospita: scegli il personaggio e parti; l\'amico si vede assegnato il Giocatore 2.', W/2, 430, 13, 'rgba(255,255,255,0.5)', 'center');
  if (net.open) text('✔ CONNESSO', W/2, 470, 16, '#5ae87a', 'center');
}

// ------------------------------------------------ LOOP
function startRun(){
  coinsRun = 0; cristalli = 0; lavagun = false; deaths = 0;
  gilbertAlly = false; villageBurning = false;
  boons = {}; pet = null; slowT = 0; superRain = null; combo = { n:0, t:0 }; shake = 0;
  startTime = performance.now();
  const cdef = CHARS[selIdx];
  players = [mkPlayer(cdef, selCostume, 0, 0, 0)];
  sfx('organ');
  startCut([
    { who:'cornelius', text:'"GIOCATORE 1: ' + cdef.name + '. Benvenuto nella mia anticamera. La freccia verde ti porta nel mio mondo. Che tu ne sia... indegno."' },
  ], () => { loadLevel(0); state = 'play'; showToast(lvl.name); }, 'lab');
}
function update(){
  pollGamepads();
  if (jp('KeyM')) muted = !muted;
  if (jp('F2')) crtOn = !crtOn;
  if (jp('KeyP') && (state === 'play' || state === 'pause') && !menu){
    state = state === 'play' ? 'pause' : 'play';
    sfx('text');
  }
  if (net.role === 'host') updateHostNet();
  if (net.role === 'guest' && (state === 'guestplay')) updateGuest();
  switch(state){
    case 'tv':
      if (!ready()) break;
      tvT++;
      if (tvT === 1) sfx('organ');
      if (tvT === 150) sfx('organ');
      if (tvT > 330 || OKJ()){
        startCut(labPages(), () => { state = 'title'; setSong('title'); }, 'lab');
      }
      break;
    case 'title':
      if (jp('KeyO')){ state = 'online'; sfx('text'); break; }
      if (OKJ()){ state = 'select'; sfx('coin'); }
      break;
    case 'online':
      if (jp('Digit1')){ netSetup('host'); sfx('coin'); }
      if (jp('Digit2')){ netSetup('guest'); sfx('coin'); }
      if (jp('KeyX') || jp('Escape')){ state = 'title'; }
      if (net.role === 'host' && net.open && OKJ()){ state = 'select'; sfx('coin'); }
      break;
    case 'select': {
      selMsg = '';
      const cols = 7;
      if (jp('ArrowRight') || jp('KeyD') || gpJP(0,'right')) { selIdx = (selIdx + 1) % CHARS.length; selCostume = null; sfx('text'); }
      if (jp('ArrowLeft')  || jp('KeyA') || gpJP(0,'left'))  { selIdx = (selIdx + CHARS.length - 1) % CHARS.length; selCostume = null; sfx('text'); }
      if (jp('ArrowDown')  || jp('KeyS') || gpJP(0,'down'))  { selIdx = Math.min(CHARS.length - 1, selIdx + cols); selCostume = null; sfx('text'); }
      if (jp('ArrowUp')    || jp('KeyW')) { selIdx = Math.max(0, selIdx - cols); selCostume = null; sfx('text'); }
      if (jp('KeyC') || gpJP(0,'ab')){
        const c = CHARS[selIdx];
        if (isUnlocked(c) && COSTUMES[c.id]){
          const list = [null, ...COSTUMES[c.id]];
          selCostume = list[(list.indexOf(selCostume) + 1) % list.length];
          sfx('text');
        }
      }
      if (jp('KeyN') && SAVE.finished){ nightmare = !nightmare; sfx(nightmare ? 'organ' : 'text'); }
      if (jp('Enter') || gpJP(0,'ok')){
        const c = CHARS[selIdx];
        if (isUnlocked(c)){
          if (net.role === 'guest'){ netSend({ t:'hello', id:c.id, cost: selCostume }); state = 'guestplay'; showToast('Sei il Giocatore 2!'); }
          else startRun();
        }
        else if (SAVE.wallet >= c.cost){
          SAVE.wallet -= c.cost; SAVE.chars[c.id] = true; saveGame(); sfx('buy');
          showToast('SBLOCCATO: ' + c.name);
        } else { selMsg = 'Non hai abbastanza monete: gioca e raccogline!'; sfx('hurt'); }
      }
      break; }
    case 'guestplay': break;
    case 'pause': break;
    case 'cut': updateCut(); break;
    case 'play':
      if (menu) updateMenu();
      else updatePlay();
      break;
    case 'over':
      if (jp('Enter')){
        players.forEach(p => { p.hp = p.maxhp; p.downT = 0; });
        loadLevel(lvlIdx); state = 'play';
      }
      break;
    case 'win':
      if (jp('Enter')){ state = 'title'; setSong('title'); }
      break;
  }
  updateMusic();
}
function draw(){
  ctx.clearRect(0, 0, W, H);
  switch(state){
    case 'tv':     drawTV(); break;
    case 'title':  drawTitle(); break;
    case 'online': drawOnlineMenu(); break;
    case 'select': drawSelect(); break;
    case 'cut':    drawCut(); break;
    case 'play':   drawPlay(); break;
    case 'guestplay': drawGuest(); break;
    case 'pause':
      drawPlay();
      ctx.fillStyle = 'rgba(4,4,12,0.7)'; ctx.fillRect(0, 0, W, H);
      text('PAUSA', W/2, 200, 48, '#f5d442', 'center');
      text('P1: frecce + Z salto · X attacco · C abilità · V super', W/2, 270, 15, '#fff', 'center');
      text('P2: WASD + F attacco · G abilità · H super  (joystick supportati)', W/2, 296, 15, '#fff', 'center');
      text('GIÙ vicino a Hilda = negozio · GIÙ alla forgia = lancia-lava', W/2, 322, 14, '#9a9ac0', 'center');
      text('M audio · F2 effetto CRT · P riprendi', W/2, 360, 14, '#5ae87a', 'center');
      break;
    case 'over':   drawPlay(); drawOver(); break;
    case 'win':    drawWin(); break;
  }
  if (state !== 'tv') drawCRT();
}

let last = 0, acc = 0;
function loop(t){
  requestAnimationFrame(loop);
  const dt = Math.min(t - last, 100); last = t;
  acc += dt;
  while (acc >= 1000/60){
    update();
    for (const k in justPressed) delete justPressed[k];
    frame++;
    acc -= 1000/60;
  }
  draw();
}
// debug console: _hawk.goto(n) salta al livello n (0=hub)
window._hawk = {
  goto(i){ if (!players.length){ players = [mkPlayer(CHARS[0], null, 0, 0, 0)]; } loadLevel(i); state = 'play'; },
  info(){ return { state, lvlIdx, players: players.map(p=>({id:p.cdef.id,hp:p.hp,x:Math.round(p.x),y:Math.round(p.y)})), menu: menu && menu.type, wallet:SAVE.wallet, cristalli, lavagun, boss: boss && boss.hp, rival: rival && rival.hp, gilbertAlly, villageBurning, assets: assetsDone + '/' + assetsTotal }; },
  kill(){ if (boss && !boss.dead) hitBoss(boss.hp); },
  dmg(n){ if (boss && !boss.dead) hitBoss(n); },
  beatRival(){ if (rival && !rival.defeated) hitRival(rival.hp); },
  tp(x){ players.forEach((p,k) => { p.x = x + k*24; p.y = 60; }); },
  give(n){ SAVE.wallet += n||100; saveGame(); },
  gems(n){ cristalli += n||3; },
  forge(){ tryForge(); },
  soul(){ players.forEach(p => p.soul = 100); },
  super(){ if (players[0]) activateSuper(players[0]); },
  boon(id){ const b = BOONS.find(x => x.id === id); if (b){ b.act(players[0]); boons[id] = true; } },
  incubo(){ SAVE.finished = true; nightmare = !nightmare; },
  p2(){ joinP2(); },
  next(){ if (cut){ cut.i++; if (cut.i >= cut.pages.length){ const n = cut.next; cut = null; n(); } } else if (state === 'tv'){ tvT = 999; } else if (state === 'title'){ state = 'select'; } },
  step(n){ for (let i = 0; i < (n||1); i++){ update(); for (const k in justPressed) delete justPressed[k]; frame++; } draw(); },
  reset(){ localStorage.removeItem('hawk_save'); location.reload(); }
};
requestAnimationFrame(loop);
</script>
